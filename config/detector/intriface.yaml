# log dir 
log_dir: .../IntriFACE/logs
# checkpoint save dir
checkpoint_save_dir: .../IntriFACE/checkpoints

#LMDB dir
lmdb_dir: 'I:\transform_2_lmdb'

# local model setting
pretrained: .../IntriFACE/base/xception-b5690688.pth
explicit_extractor_pretrained: .../IntriFACE/base/arcface_checkpoint.tar
explicit_feature_bank_path: .../IntriFACE/base/explicit_identity_bank.pth
encoder_path: .../IntriFACE/models/model_128_ir_se50.pth
weights128_celeb_path: .../IntriFACE/models/weights128_celeb
iib_checkpoint_path: .../IntriFACE/base/ckpt_ks_I.pth
model_name: intriface   # model name
backbone_name: xception  # backbone name


restore_ckpt: 'None'
#backbone setting
backbone_config:
  mode: adjust_channel #adjust_channel
  num_classes: 2
  inc: 3
  dropout: false

# dataset
all_dataset: [FaceForensics++, FF-F2F, FF-DF, FF-FS, FF-NT, FaceShifter, DeepFakeDetection, Celeb-DF-v1, Celeb-DF-v2, DFDCP, DFDC, DeeperForensics-1.0, UADFV]
# train_dataset: [Celeb-DF-v2, DFDCP, FaceForensics++, FF-F2F, FF-DF, FF-FS, FF-NT]
# train_dataset: [FaceForensics++, FF-F2F, FF-DF, FF-FS, FF-NT]
train_dataset: [Celeb-DF-v2]
# test_dataset: [UADFV, DFDCP, FF-DF, FF-FS]
test_dataset: [UADFV, DFDCP, FF-DF]
compression: c23  # compression-level for videos
train_dataloader:  
  batch_size: 64
  num_workers: 4
  drop_last: true 
test_dataloader: 
  batch_size: 32
  num_workers: 4
  drop_last: false  
frame_num: {'train': 32, 'test': 32} 
resolution: 256 
with_mask: false 
with_landmark: false 


# data augmentation
use_data_augmentation: true  # Add this flag to enable/disable data augmentation
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: [-10, 10]
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100
  remove_attribute: false
  gridmask_prob: 0
  remove_nose_prob: 0.0
  remove_eyes_prob: 0.0


# mean and std for normalization
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]

# optimizer config
optimizer:
  # choose between 'adam' and 'sgd'
  type: sgd
  adam:
    lr: 0.1  # learning rate
    beta1: 0.9  # beta1 for Adam optimizer
    beta2: 0.999 # beta2 for Adam optimizer
    eps: 0.00000001  # epsilon for Adam optimizer
    weight_decay: 0.0005  # weight decay for regularization
    amsgrad: false
  sgd:
    lr: 0.0002  # learning rate
    momentum: 0.9  # momentum for SGD optimizer
    weight_decay: 0.0005  # weight decay for regularization
  sam:
    lr: 0.001  # learning rate
    momentum: 0.9  # momentum for SGD optimizer

# training config
lr_scheduler: 'multistep'   # learning rate scheduler step
lr_milestones: [8, 14]    # Reduce the learning rate in the 8th and 14th epochs
lr_step: 3
lr_gamma: 0.1   # learning rate scheduler
nEpochs: 300   # number of epochs to train for
start_epoch: 0   # manual epoch number (useful for restarts)
save_epoch: 1   # interval epochs for saving models
rec_iter: 100   # interval iterations for recording
logdir: ./logs   # folder to output images and logs
manualSeed: 1024   # manual seed for random number generation
save_ckpt: true   # whether to save checkpoint
save_feat: true   # whether to save features

# loss function
loss_func: cross_entropy   # loss function to use cross_entropy

losstype: null

# metric
metric_scoring: auc   # metric for evaluation (auc, acc, eer, ap)

# cuda

cuda: true   # whether to use CUDA acceleration
cudnn: true   # whether to use CuDNN for convolution operations

embedding_size: 512

# 添加权重转换配置
model_config:
  convert_weights: true
  init_missing: true